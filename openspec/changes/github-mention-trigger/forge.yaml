acceptance_criteria:
  - id: AC1
    text: "WHEN an issue_comment.created webhook arrives whose body mentions @{GITHUB_APP_SLUG} and no existing task resolves (branch pattern, PR lookup, issue mapping) THEN the router returns a new new_task action carrying repo, issue/PR number, comment id, and author. WHEN the body contains no mention THEN the event is discarded exactly as today."
    method: unit
    status: pending
    evidence: null
  - id: AC2
    text: "WHEN a new_task event's author has write/maintain/admin on the repo THEN a task is created; knowledge.log is seeded with repo, issue/PR number, title, body, the mentioning comment text, author, and a link back; the PM receives the new-task prompt; task metadata records the GitHub origin (repo + issue number → taskId)."
    method: integration
    status: pending
    evidence: null
  - id: AC3
    text: "WHEN the author's permission is read/none THEN no task is created, the event is discarded with a logged reason, and no reply is posted."
    method: unit
    status: pending
    evidence: null
  - id: AC4
    text: "WHEN an issues.opened webhook arrives with the mention in the issue body THEN behavior matches AC2 (the issues event is newly routed; today it falls to noop)."
    method: integration
    status: pending
    evidence: null
  - id: AC5
    text: "WHEN a task is created from a mention THEN Archie acknowledges in-thread: eyes reaction on the triggering comment (or the issue for issues.opened) plus a short comment naming the task."
    method: integration
    status: pending
    evidence: null
  - id: AC6
    text: "WHEN the PM posts to the user on a GitHub-born task THEN the message lands as a comment on the originating issue/PR thread — never the 'no default channel — message dropped' path."
    method: integration
    status: pending
    evidence: null
  - id: AC7
    text: "WHEN a subsequent non-bot comment lands on the same issue/PR THEN it routes to the existing task via the issue→task mapping, deduplicated by comment id, and the PM is pinged with the existing-task prompt."
    method: integration
    status: pending
    evidence: null
  - id: AC8
    text: "WHEN the comment author is {GITHUB_APP_SLUG}[bot] — including Archie's own acknowledgments — THEN nothing is routed and no task is created (loop safety)."
    method: unit
    status: pending
    evidence: null
  - id: AC9
    text: "WHEN an authorized mention arrives in a repo no plugin declares THEN a polite decline comment is posted and no task is created."
    method: unit
    status: pending
    evidence: null
  - id: AC10
    text: "WHEN an agent calls request_edit_mode on a GitHub-born task THEN the request is declined immediately with a message stating GitHub-born tasks are readonly in v1; edit_allowed is never set; no silent hang."
    method: unit
    status: pending
    evidence: null
  - id: AC11
    text: "Regression: comments on Archie-managed PR branches still route existing_task exactly as today; merge_check / checks_ready paths byte-for-byte unaffected."
    method: unit
    status: pending
    evidence: null
  - id: AC12
    text: "Against a running dockerized instance: POST a correctly signed issue_comment webhook mentioning the slug for a plugin-covered test repo THEN a task appears via the archie-debug MCP with the seeded knowledge log, and the acknowledgment is visible on the real GitHub issue."
    method: live-e2e
    status: pending
    evidence: null
  - id: AC13
    text: "The production GitHub App subscribes to issues (and keeps issue_comment). Post-merge step: update webhook subscriptions in the GitHub App settings, then verify one real mention creates a task."
    method: deploy-only
    status: pending
    evidence: null
