acceptance_criteria:
  - id: AC1
    text: "WHEN a PR linked to a task is in a repo whose agent frontmatter lacks autoMerge: true, and an approval webhook arrives with the PR mergeable, THEN the system does not merge, and the PM posts exactly one Slack-thread notification that the PR is ready and can be merged on request — including when multiple merge-triggering webhooks (approval, synchronize, push, workflow_run) arrive for the same PR state."
    method: integration
    status: pending
    evidence: null
  - id: AC2
    text: "WHEN the repo agent frontmatter sets autoMerge: true and an approval webhook arrives with the PR mergeable, THEN the system squash-merges as today."
    method: integration
    status: pending
    evidence: null
  - id: AC3
    text: "WHEN an agent calls merge_pull_request in a non-auto repo, THEN the tool does not merge; the task pauses with an approval_requested event of type merge (observed live via wait_for_task APPROVAL_TYPE=merge), and denying the request results in no merge."
    method: live-e2e
    status: pending
    evidence: null
  - id: AC4
    text: "WHEN the user approves the surfaced merge request AND GitHub reports the PR mergeable, THEN the merge executes and the user is notified; if not mergeable, the tool reports why instead."
    method: integration
    status: pending
    evidence: null
  - id: AC5
    text: "WHEN the explicit-request merge path runs on a PR with zero GitHub review approvals but GitHub reports it mergeable, THEN the merge proceeds — no Archie-side approval floor."
    method: unit
    status: pending
    evidence: null
  - id: AC6
    text: "WHEN an agent calls merge_pull_request in an autoMerge: true repo in edit mode, THEN it merges directly with no extra approval prompt (current behavior)."
    method: integration
    status: pending
    evidence: null
  - id: AC7
    text: "WHEN no frontmatter is changed anywhere, THEN no repo auto-merges — the default is off for every agent, including Archie's own repo."
    method: unit
    status: pending
    evidence: null
  - id: AC8
    text: "WHEN a user clicks the approve/deny button on a merge-approval Slack message, THEN the merge approval resolves identically to the API path (new action ids wired to the same resolution code as approve_edit_mode/deny_edit_mode)."
    method: integration
    status: pending
    evidence: null
  - id: AC9
    text: "First real merge-on-request after deploy: in a non-auto repo, a merge request is approved via the actual Slack button and the PR actually merges."
    method: deploy-only
    status: pending
    evidence: null
