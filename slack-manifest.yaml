display_information:
  name: Archie
  description: "Autonomous Responsive and Collaborative Hyper Intelligent Employee"
  background_color: "#2c2d30"
features:
  bot_user:
    display_name: Archie
    always_online: true
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - chat:write
      - channels:history
      - channels:read
      - im:history
      - im:read
      - im:write
      - users:read
      - usergroups:read
      - files:read
      - reactions:write
settings:
  interactivity:
    is_enabled: true
    request_url: https://archie.sweatco.team/webhooks/slack
  event_subscriptions:
    request_url: https://archie.sweatco.team/webhooks/slack
    bot_events:
      - app_mention
      - message.channels
      - message.im
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
