display_information:
  name: Archie
  description: "Autonomous Responsive and Collaborative Hyper Intelligent Employee"
  background_color: "#2c2d30"
features:
  bot_user:
    display_name: Archie
    always_online: true
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - chat:write
      - channels:history
      - channels:read
      - users:read
      - usergroups:read
      - files:read
settings:
  interactivity:
    is_enabled: true
    request_url: https://8d5ac472ff08.ngrok-free.app/webhooks/slack
  event_subscriptions:
    request_url: https://8d5ac472ff08.ngrok-free.app/webhooks/slack
    bot_events:
      - app_mention
      - message.channels
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
