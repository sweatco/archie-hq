display_information:
  name: Archie
  description: "Autonomous Repository Collaborative Hybrid Intelligent Engineer"
  background_color: "#2c2d30"
features:
  bot_user:
    display_name: Archie
    always_online: true
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - chat:write
      - channels:history
      - channels:read
      - users:read
      - usergroups:read
settings:
  event_subscriptions:
    request_url: https://REPLACE-WITH-YOUR-NGROK-URL.ngrok.io/slack/events
    bot_events:
      - app_mention
      - message.channels
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
