title = "Archie gitleaks config"

# Use gitleaks' built-in rules, plus the allowlist below for known, intentional
# non-secrets so the CI gate doesn't false-positive on them.
[extend]
useDefault = true

[allowlist]
description = "Intentional non-secret fixtures and placeholders"

# Placeholder values live here (sk-ant-..., xoxb-..., your-webhook-secret, etc.)
# and the sanitizer test deliberately embeds dummy token-shaped strings to test
# the secret detector itself.
paths = [
  '''\.env\.example$''',
  '''src/memory/__tests__/sanitize\.test\.ts$''',
]

# Belt-and-suspenders: the specific dummy values, in case they ever move files.
regexes = [
  '''ghp_abcdef1234567890ABCDEF12''',
  '''AKIAIOSFODNN7EXAMPLE''',
]
