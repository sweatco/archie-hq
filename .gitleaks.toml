title = "Archie gitleaks config"

# Use gitleaks' built-in rules, plus the allowlist below for known, intentional
# non-secrets so the CI gate doesn't false-positive on them.
[extend]
useDefault = true

# Modern gitleaks (8.19+) uses the plural [[allowlists]] array-of-tables; the
# legacy singular [allowlist] table is ignored by newer versions.
[[allowlists]]
description = "Intentional non-secret fixtures and placeholders"

# Placeholder values live in .env.example (sk-ant-..., xoxb-..., your-webhook-secret,
# etc.), and the sanitizer test deliberately embeds dummy token-shaped strings to
# test the secret detector itself. Match on the file path...
paths = [
  '''\.env\.example$''',
  '''src/memory/__tests__/sanitize\.test\.ts$''',
  # The local-development setup guide contains illustrative example credentials
  # (e.g. xoxb-1234567890-..., a sequential signing-secret placeholder). These
  # are documentation examples, not real secrets. Matches the current path
  # (docs/guides/) and the historical one (docs/).
  '''local-development\.md$''',
]

# ...and, belt-and-suspenders, on the specific dummy values in case they move.
# The sk-abc123... entry also covers a historical QA-evidence transcript
# (openspec/changes/github-mention-trigger/qa-evidence/test-run.txt @ 3d3397f)
# that captured the sanitizer suite's output — the fixture leaked into history
# via a committed test log, not a real credential.
regexes = [
  '''ghp_abcdef1234567890ABCDEF12''',
  '''AKIAIOSFODNN7EXAMPLE''',
  '''sk-abcdefghijklmnopqrstuv''',
  '''sk-abc123def456ghi789jkl012''',
]
