# Archie HQ - Docker Compose (local development)
#
# Usage: npm run docker:dev
#
# Setup:
#   1. Copy .env.example to .env and fill in your values
#   2. Symlink plugins and pre-clone repos into workdir/ (see docs/guides/local-development.md)
#   3. Ensure your SSH key is loaded: ssh-add
#
# Logs:
#   docker compose logs -f          # Follow all logs
#   docker compose logs -f archie   # Follow archie logs only
#
# ngrok (in separate terminal):
#   ngrok http 3000
#   Then update Slack app URL to: https://xxxx.ngrok.io/slack/events

services:
  archie:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"

    # Capabilities for bubblewrap sandbox (full namespace isolation)
    # SYS_ADMIN: namespace creation and mount ops
    # seccomp/apparmor unconfined: allows bwrap's pivot_root and mount syscalls
    # systempaths unconfined: removes /proc masking so bwrap can mount fresh procfs
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
      - systempaths=unconfined

    # Environment variables from .env file
    env_file:
      - .env

    # Override paths for containerized environment
    environment:
      - CLAUDE_PATH=/usr/local/bin/claude
      - ARCHIE_WORKDIR=/workdir
      # - GITHUB_APP_PRIVATE_KEY_PATH=/app/secrets/github-private-key.pem
      - SSH_AUTH_SOCK=/run/host-services/ssh-auth.sock
      - NODE_ENV=development

    volumes:
      # Workdir mount — contains repos/, sessions/
      - ./workdir:/workdir

      # Plugins — mounted explicitly because workdir/plugins is a symlink
      - ./workdir/plugins:/workdir/plugins

      # Mount source code for hot reload
      - ./src:/app/src
      - ./prompts:/app/prompts

      # SSH agent forwarding (macOS Docker Desktop)
      - /run/host-services/ssh-auth.sock:/run/host-services/ssh-auth.sock

      # Secrets - mounts deploy-time secrets (GitHub App key) AND runtime
      # OAuth tokens written by `oauth:connect`. Read-write so the daemon
      # can persist refreshed tokens.
      - ./secrets:/app/secrets

      # Claude Code config - stores API keys, sessions, settings
      - ./claude-data:/home/archie/.claude
      - ./claude-data/.claude.json:/home/archie/.claude.json

      # Exclude node_modules (use container's version)
      - /app/node_modules

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:${PORT:-3000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
